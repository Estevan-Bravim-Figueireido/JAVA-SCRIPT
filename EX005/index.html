<!DOCTYPE html>
<html lang=pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            background-color: beige;
            color: rgb(36, 35, 35);
            font: normal, 18px, Arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai os resutados</p>
  <p>Aprendendo a usar o <strong>DOM</strong> em JS</p>
    <div id="div1">cique em mim</div>

    <script>
    var p1 = window.document.getElementsByTagName("p")[0]
    window.document.write(`esta escrito assim ${p1.innerText}`)
    var iddiv= window.document.getElementById("div1")
    iddiv.style.background= 'green'
    </script>
    
</body>
</html>
