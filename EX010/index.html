<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Detra</title>
</head>
<body>
    <h1>Sitema de multas</h1>
    Velocidade do carro:<input type="number" name="vel" id="txtvel"> Km/hr
    <input type="button" value="verificar" onclick="calcular()">
<div id="res">

</div>


    <script>
       
        function calcular(){
     
 var txtv =window.document.getElementById('txtvel')
 var res= window.document.getElementById('res')
 var vel=Number(txtv.value)
res.innerHTML=`<p>Sua velocidade e igual a<strong> ${vel}Km/hr</strong></p>`
if(vel>60){
res.innerHTML+='<p>voce foi multado</p>'


}
res.innerHTML+='dirija com cinto de seguranca'
        }



    </script>
</body>
</html>
