<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiro programa</title>
</head>
<style>
    body{
        background-color: rgb(109, 105, 173);
        color: white;
        font: normal 20pt Arial;
    }

    h1{
        color: darkgoldenrod;
    }
</style>
<body>
    <h1>Ola mundo</h1>
    <p>Ja me livrei da maldicao</p>

    <script>
    
           var n1 = Number(window.prompt('digite um numero')) //string
           var n2 = Number(window.prompt('digite outro numero'))//string
          
           var s = n1 + n2
           window.alert(`Essa e a soma de ${n1} e ${n2} que e igual a ${s} `)//concatenacao
           // (number + number) para soma
           // (string + string) para concatenacao
    </script>
    
</body>
</html>
